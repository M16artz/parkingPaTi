openapi: 3.0.3
info:
  title: ParkingPaTi API
  version: 1.0.0
  description: Contrato base de la API REST de ParkingPaTi.
paths:
  /api/v1/admin/accounts/:
    get:
      operationId: admin_accounts_list
      description: |-
        Los controladores de este proyecto son viewsets.ViewSet "planos", no
        GenericViewSet - por eso DEFAULT_PAGINATION_CLASS (settings) NO se
        aplica automaticamente a sus list(). Este mixin da una forma de una
        sola linea para paginar manualmente en los list() que devuelven
        datasets que crecen con el tiempo (hallazgo 4.7 de la auditoria).

        Uso:
            class MiViewSet(PaginacionManualMixin, viewsets.ViewSet):
                def list(self, request):
                    queryset = MiRepository.listar()
                    return self.paginar(request, queryset, MiDTO)
      parameters:
      - in: query
        name: activo
        schema:
          type: boolean
      - in: query
        name: onboarding_estado
        schema:
          enum:
          - CORREO_PENDIENTE
          - DATOS_INICIALES_PENDIENTES
          - REVISION_PENDIENTE
          - RECHAZADO
          - CONFIGURACION_PENDIENTE
          - ACTIVO
          - DESHABILITADO
          type: string
          minLength: 1
        description: |-
          * `CORREO_PENDIENTE` - Correo pendiente
          * `DATOS_INICIALES_PENDIENTES` - Datos iniciales pendientes
          * `REVISION_PENDIENTE` - Revision pendiente
          * `RECHAZADO` - Rechazado
          * `CONFIGURACION_PENDIENTE` - Configuracion pendiente
          * `ACTIVO` - Activo
          * `DESHABILITADO` - Deshabilitado
      - in: query
        name: q
        schema:
          type: string
          maxLength: 150
          minLength: 1
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCuentaPaginaDTO'
          description: ''
  /api/v1/admin/accounts/{cuenta_id}/:
    get:
      operationId: admin_accounts_retrieve
      parameters:
      - in: path
        name: cuenta_id
        schema:
          type: integer
        required: true
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:

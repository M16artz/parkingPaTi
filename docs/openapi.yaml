components:
  schemas:
    AdminAccionResponseDTO:
      type: object
      properties:
        detail:
          type: string
        cuenta_id:
          type: integer
        onboarding_estado:
          type: string
        email_enviado:
          type: boolean
      required:
      - cuenta_id
      - detail
      - onboarding_estado
    AdminCrearCuentaDTO:
      type: object
      description: |-
        DTO exclusivo del endpoint administrativo de creacion de cuentas
        (protegido con EsAdministrador). A diferencia de RegistroDTO (registro
        publico), este SI permite elegir el rol, porque quien lo invoca ya es
        un administrador autenticado.
      properties:
        nombre:
          type: string
          maxLength: 100
        apellido:
          type: string
          maxLength: 100
        tipo_identificacion:
          $ref: '#/components/schemas/TipoIdentificacionEnum'
        identificacion:
          type: string
          maxLength: 20
        username:
          type: string
          maxLength: 150
        correo:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
          minLength: 8
        rol:
          allOf:
          - $ref: '#/components/schemas/RolEnum'
          default: PROPIETARIO
      required:
      - apellido
      - correo
      - identificacion
      - nombre
      - password
      - tipo_identificacion
      - username
    AdminCuentaDetalleDTO:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        correo:
          type: string
          format: email
          maxLength: 254
        persona:
          $ref: '#/components/schemas/AdminPersonaDTO'
        is_active:
          type: boolean
          title: Activo
          description: Indica si el usuario debe ser tratado como activo. Desmarque
            esta opción en lugar de borrar la cuenta.
        correo_verificado:
          type: boolean
        onboarding_estado:
          $ref: '#/components/schemas/OnboardingEstadoEnum'
        date_joined:
          type: string
          format: date-time
          title: Fecha de alta
        parqueadero:
          allOf:
          - $ref: '#/components/schemas/AdminParqueaderoDTO'
          nullable: true
          readOnly: true
        documento:
          allOf:
          - $ref: '#/components/schemas/AdminDocumentoDTO'
          nullable: true
          readOnly: true
      required:
      - correo
      - documento
      - id
      - parqueadero
      - persona
    AdminCuentaPaginaDTO:
      type: object
      properties:
        count:
          type: integer
        next:
          type: string
          format: uri
          nullable: true
        previous:
          type: string
          format: uri
          nullable: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/AdminCuentaResumenDTO'
      required:
      - count
      - next
      - previous
      - results
    AdminCuentaResumenDTO:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        correo:
          type: string
          format: email
          maxLength: 254
        persona:
          $ref: '#/components/schemas/AdminPersonaDTO'
        is_active:
          type: boolean
          title: Activo
          description: Indica si el usuario debe ser tratado como activo. Desmarque
            esta opción en lugar de borrar la cuenta.
        correo_verificado:
          type: boolean
        onboarding_estado:
          $ref: '#/components/schemas/OnboardingEstadoEnum'
        parqueadero_nombre:
          type: string
          nullable: true
          readOnly: true
        date_joined:
          type: string
          format: date-time
          title: Fecha de alta
      required:
      - correo
      - id
      - parqueadero_nombre
      - persona
    AdminDocumentoAccesoDTO:
      type: object
      properties:
        url:
          type: string
          format: uri
      required:
      - url
    AdminDocumentoDTO:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nombre_original:
          type: string
          maxLength: 255
        mime_type:
          type: string
          maxLength: 100
        size_bytes:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        estado:
          $ref: '#/components/schemas/DocumentoEstadoEnum'
        motivo_rechazo:
          type: string
        uploaded_at:
          type: string
          format: date-time
          readOnly: true
        reviewed_at:
          type: string
          format: date-time
          nullable: true
        revisado_por:
          type: string
          nullable: true
          readOnly: true
      required:
      - id
      - mime_type
      - nombre_original
      - revisado_por
      - size_bytes
      - uploaded_at
    AdminParqueaderoDTO:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nombre:
          type: string
          maxLength: 150
        descripcion:
          type: string
        habilitacion_estado:
          $ref: '#/components/schemas/HabilitacionEstadoEnum'
        estado_operativo:
          $ref: '#/components/schemas/EstadoOperativoEnum'
        motivo_rechazo:
          type: string
        calle_principal:
          type: string
        calle_secundaria:
          type: string
        numero_lote:
          type: string
        latitud:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
        longitud:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - calle_principal
      - calle_secundaria
      - id
      - latitud
      - longitud
      - nombre
      - numero_lote
      - updated_at
    AdminPersonaDTO:
      type: object
      properties:
        nombre:
          type: string
          maxLength: 100
        apellido:
          type: string
          maxLength: 100
        tipo_identificacion:
          $ref: '#/components/schemas/TipoIdentificacionEnum'
        identificacion:
          type: string
          maxLength: 20
      required:
      - apellido
      - identificacion
      - nombre
      - tipo_identificacion
    AdminRechazoDTO:
      type: object
      properties:
        motivo:
          type: string
          maxLength: 1000
          minLength: 3
      required:
      - motivo
    AdminSolicitudDetalleDTO:

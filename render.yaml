services:
  - type: web
    name: parkingpati-api-staging
    runtime: python
    plan: free
    region: ohio
    rootDir: backend
    buildCommand: pip install -r requirements/prod.txt && python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DJANGO_LOG_LEVEL
        value: INFO
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: JWT_COOKIE_SECURE
        value: "True"
      - key: JWT_COOKIE_SAMESITE
        value: None
      - key: FRONTEND_BASE_URL
        sync: false
      - key: EMAIL_VERIFICATION_PROVIDER
        value: resend
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: onboarding@resend.dev
      - key: RESEND_TO_EMAIL
        value: marmasordonez@gmail.com
      - key: PRIVATE_DOCUMENT_STORAGE
        value: local
      - key: DB_NAME
        value: postgres
      - key: DB_USER
        value: postgres.wmikjzfzydqdqapxdtpz
      - key: DB_PASSWORD
        sync: false
      - key: DB_HOST
        value: aws-0-ca-central-1.pooler.supabase.com
      - key: DB_PORT
        value: "5432"
      - key: DB_CONN_MAX_AGE
        value: "0"
      - key: DB_SSL_REQUIRE
        value: "True"
